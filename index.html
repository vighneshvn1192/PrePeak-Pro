<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrePeak Pro | AI Intel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page-content { display: none; } .page-content.active { display: block; }
        .loader { border-top-color: #3b82f6; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans selection:bg-blue-500/30">

    <div id="auth-section" class="flex items-center justify-center min-h-screen">
        <div class="bg-slate-900 p-10 rounded-3xl border border-slate-800 w-full max-w-md shadow-2xl">
            <h1 class="text-4xl font-black text-blue-500 text-center mb-8 tracking-tighter">PrePeak Pro</h1>
            <input id="email" type="text" placeholder="User: test" class="w-full p-4 bg-slate-800 rounded-xl mb-4 border border-slate-700 outline-none focus:border-blue-500">
            <input id="password" type="password" placeholder="Pass: test" class="w-full p-4 bg-slate-800 rounded-xl mb-6 border border-slate-700 outline-none focus:border-blue-500">
            <button onclick="login()" class="w-full bg-blue-600 p-4 rounded-xl font-black text-lg hover:bg-blue-500 transition-all">ENTER DASHBOARD</button>
            <p id="auth-msg" class="mt-4 text-center text-xs font-bold text-slate-500"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 border-r border-slate-800 p-6 flex flex-col">
            <h2 class="text-2xl font-black text-blue-500 mb-10 italic">PrePeak</h2>
            <nav class="space-y-2 flex-1">
                <button onclick="showPage('seo')" class="w-full text-left p-3 rounded-lg bg-slate-800 text-blue-400 font-bold">📈 SEO HUB</button>
                <button onclick="showPage('sem')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 font-bold text-slate-500">🕵️ SEM SPY</button>
                <button onclick="showPage('ad')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 font-bold text-slate-500">🎨 AD FACTORY</button>
            </nav>
            <button onclick="location.reload()" class="text-xs text-slate-600 font-bold hover:text-red-500">LOGOUT</button>
        </aside>

        <main class="flex-1 p-10 overflow-y-auto">
            <div class="max-w-4xl mx-auto mb-12 flex gap-3">
                <input id="search-input" type="text" placeholder="Enter Niche or Domain (e.g. 'Fitness App')" class="flex-1 p-4 bg-slate-900 rounded-2xl border border-slate-800 outline-none focus:border-blue-500 font-bold">
                <button onclick="runAnalysis()" class="bg-blue-600 px-8 rounded-2xl font-black hover:bg-blue-500 transition-all">ANALYZE</button>
            </div>

            <div id="loading" class="hidden text-center py-20">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-800 h-12 w-12 mx-auto mb-4"></div>
                <p class="text-blue-400 font-black animate-pulse">AI ANALYZING MARKET DATA...</p>
            </div>

            <div id="main-content" class="max-w-6xl mx-auto space-y-10">
                
                <div id="seo" class="page-content active">
                    <h3 class="text-2xl font-black mb-6 uppercase tracking-widest">Market Saturation</h3>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800">
                            <p class="text-slate-500 text-xs font-bold mb-2 uppercase">Saturation Index</p>
                            <h4 id="sat-val" class="text-6xl font-black text-green-400">--%</h4>
                            <div class="w-full bg-slate-800 h-3 rounded-full mt-6 overflow-hidden">
                                <div id="sat-bar" class="bg-green-500 h-full transition-all duration-1000" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800">
                            <p class="text-slate-500 text-xs font-bold mb-2 uppercase">Keyword Difficulty</p>
                            <h4 id="diff-val" class="text-6xl font-black text-yellow-400">--</h4>
                            <p id="diff-msg" class="text-xs text-slate-500 mt-6 font-bold uppercase tracking-widest">Enter Niche Above</p>
                        </div>
                    </div>
                </div>

                <div id="sem" class="page-content">
                    <h3 class="text-2xl font-black mb-6 uppercase tracking-widest">Competitor Spend</h3>
                    <div id="sem-results" class="grid grid-cols-3 gap-6 opacity-50">
                        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 text-center">
                            <p class="text-xs text-slate-500 font-bold mb-2 uppercase">Monthly Ad Spend</p>
                            <p id="sem-spend" class="text-3xl font-black text-blue-400">$0.00</p>
                        </div>
                        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 text-center">
                            <p class="text-xs text-slate-500 font-bold mb-2 uppercase">Active Keywords</p>
                            <p id="sem-keys" class="text-3xl font-black text-blue-400">0</p>
                        </div>
                        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 text-center">
                            <p class="text-xs text-slate-500 font-bold mb-2 uppercase">Avg. CPC</p>
                            <p id="sem-cpc" class="text-3xl font-black text-blue-400">$0.00</p>
                        </div>
                    </div>
                </div>

                <div id="ad" class="page-content">
                    <h3 class="text-2xl font-black mb-6 uppercase tracking-widest">AI Creative Hooks</h3>
                    <div id="ad-results" class="space-y-4">
                        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 border-dashed text-slate-600 font-bold text-center">
                            Click 'Analyze' to generate AI Ad Variations
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(e === 'test' && p === 'test') {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } else {
                document.getElementById('auth-msg').innerText = "Try 'test' / 'test'";
            }
        }

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('bg-slate-800', 'text-blue-400'));
            event.target.classList.add('bg-slate-800', 'text-blue-400');
        }

        function runAnalysis() {
            const niche = document.getElementById('search-input').value;
            if(!niche) return;

            // Show Loader
            document.getElementById('main-content').classList.add('opacity-20');
            document.getElementById('loading').classList.remove('hidden');

            setTimeout(() => {
                // Hide Loader
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('main-content').classList.remove('opacity-20');
                
                // SEO Hub Update
                const sat = Math.floor(Math.random() * 40) + 20;
                document.getElementById('sat-val').innerText = sat + "%";
                document.getElementById('sat-bar').style.width = sat + "%";
                document.getElementById('diff-val').innerText = Math.floor(Math.random() * 30) + 40;
                document.getElementById('diff-msg').innerText = "Healthy Growth Opportunity Found";

                // SEM Spy Update
                document.getElementById('sem-results').classList.remove('opacity-50');
                document.getElementById('sem-spend').innerText = "$" + (Math.random() * 5 + 1).toFixed(1) + "K";
                document.getElementById('sem-keys').innerText = Math.floor(Math.random() * 800) + 200;
                document.getElementById('sem-cpc').innerText = "$" + (Math.random() * 2 + 1).toFixed(2);

                // Ad Factory Generator
                const ads = [
                    `Stop failing at ${niche}. Our AI tool gives you the edge.`,
                    `The secret to a 6-figure ${niche} business is market intel.`,
                    `Is your ${niche} idea actually profitable? Find out in 60s.`
                ];
                document.getElementById('ad-results').innerHTML = ads.map(a => 
                    `<div class="bg-blue-600/10 p-4 rounded-xl border border-blue-500/20 text-blue-400 font-bold">📣 ${a}</div>`
                ).join('');

            }, 1500);
        }
    </script>
</body>
</html>
