<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrePeak Pro | Global GTM Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .view-layer { display: none; } .view-layer.active { display: flex; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(32px); border: 1px solid rgba(51, 65, 85, 0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Fix Overlaps with Auto-Grid */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; width: 100%; }
        .nav-btn.active { background: #1e293b; color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); }
        input[type="range"] { -webkit-appearance: none; background: #1e293b; height: 6px; border-radius: 999px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: #3b82f6; border: 4px solid #fff; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body class="min-h-screen">

    <div id="view-login" class="view-layer active h-screen w-full items-center justify-center p-6 text-center">
        <div class="glass p-12 rounded-[3.5rem] w-full max-w-md shadow-2xl">
            <h1 class="text-6xl font-black text-blue-500 mb-2 italic tracking-tighter uppercase">PrePeak</h1>
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.5em] mb-12 italic">Identity Protocol</p>
            <div class="space-y-4">
                <input id="u" type="text" placeholder="Username" class="w-full p-5 bg-slate-950 rounded-2xl border border-slate-800 outline-none focus:border-blue-500 font-bold">
                <input id="p" type="password" placeholder="Password" class="w-full p-5 bg-slate-950 rounded-2xl border border-slate-800 outline-none focus:border-blue-500 font-bold">
                <button onclick="auth()" class="w-full bg-blue-600 p-5 rounded-2xl font-black text-xl hover:bg-blue-500 transition-all uppercase tracking-widest shadow-xl shadow-blue-600/20">Authorize</button>
            </div>
        </div>
    </div>

    <div id="view-keys" class="view-layer h-screen w-full items-center justify-center p-6 bg-[#020617]">
        <div class="glass p-12 rounded-[3.5rem] w-full max-w-2xl shadow-2xl border-blue-500/10">
            <h2 class="text-3xl font-black text-white mb-2 italic tracking-tighter text-center uppercase">System fuel</h2>
            <p class="text-slate-500 text-center text-[10px] font-black uppercase tracking-widest mb-10 italic">Compulsory API Activation</p>
            <div class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">AI Engine</label>
                        <select id="prov" class="w-full p-5 bg-slate-950 rounded-2xl border border-slate-800 text-blue-400 font-black outline-none cursor-pointer">
                            <option value="gemini">Google Gemini 1.5 (Direct)</option>
                            <option value="openai">OpenAI / Grok (Via Proxy)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Private Key</label>
                        <input id="m-key" type="password" placeholder="AI-..." class="w-full p-5 bg-slate-950 rounded-2xl border border-slate-800 focus:border-blue-500 outline-none text-xs font-mono">
                    </div>
                </div>
                <button onclick="unlock()" class="w-full bg-green-600 p-5 rounded-2xl font-black text-lg hover:bg-green-500 transition-all uppercase tracking-widest shadow-xl shadow-green-600/10">Launch Dashboard</button>
            </div>
        </div>
    </div>

    <div id="view-dash" class="view-layer h-screen w-full overflow-hidden">
        <aside class="w-80 bg-[#00020a] border-r border-slate-800/50 p-8 flex flex-col shrink-0">
            <h2 class="text-4xl font-black text-blue-500 mb-12 italic tracking-tighter uppercase">PrePeak</h2>
            <nav class="space-y-3 flex-1 overflow-y-auto no-scrollbar">
                <button onclick="tab('seo')" class="n-btn active w-full text-left p-4 rounded-xl text-blue-400 font-black bg-slate-900 border border-blue-500/20">📈 SEO HUB</button>
                <button onclick="tab('spy')" class="n-btn w-full text-left p-4 rounded-xl text-slate-500 font-bold hover:bg-slate-900">🕵️ COMPETITOR SPY</button>
                <button onclick="tab('ads')" class="n-btn w-full text-left p-4 rounded-xl text-slate-500 font-bold hover:bg-slate-900">🎨 AD FACTORY</button>
                <button onclick="tab('cost')" class="n-btn w-full text-left p-4 rounded-xl text-slate-500 font-bold hover:bg-slate-900">💰 FORECASTER</button>
            </nav>
        </aside>

        <main class="flex-1 p-10 overflow-y-auto bg-[#020617] no-scrollbar">
            <div class="max-w-4xl mx-auto mb-16">
                <div class="glass p-3 rounded-[2.5rem] flex flex-wrap md:flex-nowrap gap-4 items-center">
                    <input id="main-q" type="text" placeholder="Analyze Niche or URL..." class="flex-1 min-w-[200px] p-4 bg-transparent outline-none font-black text-2xl text-white">
                    <button onclick="execute()" class="bg-blue-600 px-10 py-4 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-blue-500 shadow-xl shadow-blue-600/20">Execute</button>
                </div>
                <p id="loader" class="hidden mt-6 text-center text-blue-500 font-black text-[10px] animate-pulse uppercase tracking-[0.5em] italic">Engine Computing Intelligence...</p>
            </div>

            <div id="results" class="max-w-6xl mx-auto space-y-12 pb-32">
                <div id="seo" class="tab-content active">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 glass p-10 rounded-[3.5rem]">
                            <label class="block text-[11px] font-black text-slate-500 uppercase mb-12 tracking-widest">Timeline: <span id="r-text" class="text-blue-400">90 Days</span></label>
                            <input id="slider" type="range" min="1" max="5" value="3" oninput="upS(this.value)" class="w-full">
                        </div>
                        <div class="glass p-10 rounded-[3.5rem] text-center border-green-500/10 shadow-2xl">
                            <h4 id="sat-val" class="text-[8rem] font-black text-green-400 italic">--%</h4>
                        </div>
                    </div>
                </div>

                <div id="spy" class="tab-content">
                    <div id="spy-results" class="card-grid">
                        <div class="glass p-16 rounded-[4rem] text-slate-600 text-center font-bold">Strategy Extraction Lab</div>
                    </div>
                </div>

                <div id="ads" class="tab-content">
                    <div id="ad-results" class="card-grid">
                        <div class="glass p-16 rounded-[4rem] text-slate-600 text-center font-bold">Creative Suite Lab</div>
                    </div>
                </div>

                <div id="cost" class="tab-content">
                    <div class="flex justify-between items-center mb-10">
                        <select id="curr" onchange="conv()" class="bg-slate-900 text-blue-400 font-black p-4 rounded-xl border border-slate-800">
                            <option value="USD" data-s="$">USD</option><option value="INR" data-s="₹">INR</option>
                            <option value="EUR" data-s="€">EUR</option><option value="AED" data-s="د.إ">AED</option>
                        </select>
                    </div>
                    <div class="glass p-20 rounded-[5rem] text-center">
                        <h4 id="cost-display" class="text-[12rem] leading-none font-black text-red-500 shadow-2xl shadow-red-500/10">$0</h4>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let rawU = 0; let mK = ""; let prov = ""; 

        function auth() {
            if(document.getElementById('u').value === 'test' && document.getElementById('p').value === 'test') {
                document.getElementById('view-login').classList.remove('active');
                document.getElementById('view-keys').classList.add('active');
            } else { alert("ACCESS DENIED."); }
        }

        function unlock() {
            mK = document.getElementById('m-key').value;
            prov = document.getElementById('prov').value;
            if(!mK) return alert("API KEY REQUIRED.");
            document.getElementById('view-keys').classList.remove('active');
            document.getElementById('view-dash').classList.add('active');
        }

        function tab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('bg-slate-900','text-blue-400','border','border-blue-500/20','active'));
            event.currentTarget.classList.add('bg-slate-900','text-blue-400','border','border-blue-500/20','active');
        }

        function upS(v) {
            const l = ["7D","30D","90D","180D","1Y"];
            document.getElementById('r-text').innerText = l[v-1];
        }

        async function execute() {
            const q = document.getElementById('main-q').value; if(!q) return;
            document.getElementById('loader').classList.remove('hidden');

            const prompt = `Analyze: "${q}". Respond ONLY in raw JSON: {"sat": 45, "cost": 5000, "spy": "Deep strategy here", "ads": [{"h": "Headline", "b": "Body text", "cta": "Click Me"}]}`;

            try {
                let url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${mK}`;
                let res = await fetch(url, { method: 'POST', body: JSON.stringify({contents: [{parts: [{text: prompt}]}]}) });
                let data = await res.json();
                
                // BULLETPROOF PARSING
                let text = data.candidates[0].content.parts[0].text;
                let cleanJson = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                let j = JSON.parse(cleanJson);

                rawU = j.cost;
                document.getElementById('sat-val').innerText = j.sat + "%";
                document.getElementById('spy-results').innerHTML = `<div class="glass p-12 rounded-[3rem] border-l-8 border-blue-500 col-span-2"><p class="text-slate-200 text-3xl font-bold italic">${j.spy}</p></div>`;
                document.getElementById('ad-results').innerHTML = j.ads.map(a => `<div class="glass p-10 rounded-[3rem] border-t-4 border-green-500 flex flex-col h-full"><h5 class="text-2xl font-black mb-4">${a.h}</h5><p class="text-slate-400 mb-8">${a.b}</p><span class="mt-auto bg-blue-600 p-4 rounded-xl font-black text-center text-xs uppercase tracking-widest">${a.cta}</span></div>`).join('');
                conv();
            } catch (e) {
                alert("CRITICAL ERROR: " + e.message);
                console.error(e);
            } finally { document.getElementById('loader').classList.add('hidden'); }
        }

        function conv() {
            const s = document.getElementById('curr'); const c = s.value; const sym = s.options[s.selectedIndex].getAttribute('data-s');
            const rates = {USD:1, INR:83, EUR:0.92, AED:3.67};
            document.getElementById('cost-display').innerText = sym + (rawU * rates[c]).toLocaleString();
        }
    </script>
</body>
</html>
