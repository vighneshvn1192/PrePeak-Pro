<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>PrePeak Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans">
    <div id="auth-section" class="flex items-center justify-center min-h-screen">
        <div class="bg-slate-900 p-10 rounded-3xl border border-slate-800 w-full max-w-md">
            <h1 class="text-4xl font-black text-blue-500 text-center mb-8">PrePeak Pro</h1>
            <input id="email" type="email" placeholder="Email (use 'test')" class="w-full p-4 bg-slate-800 rounded-xl mb-4 border border-slate-700 outline-none">
            <input id="password" type="password" placeholder="Password (use 'test')" class="w-full p-4 bg-slate-800 rounded-xl mb-6 border border-slate-700 outline-none">
            <button onclick="login()" class="w-full bg-blue-600 p-4 rounded-xl font-bold">ENTER DASHBOARD</button>
            <p id="msg" class="mt-4 text-center text-xs text-slate-500 font-bold"></p>
        </div>
    </div>
    <div id="dashboard" class="hidden p-10">
        <h2 class="text-3xl font-black text-blue-500 mb-4">Dashboard Live</h2>
        <div class="bg-slate-900 p-8 rounded-2xl border border-slate-800">
            <p class="text-green-400 font-bold">SEO Hub Active: 34% Saturation</p>
            <button onclick="location.reload()" class="mt-4 text-xs text-slate-500 underline">Logout</button>
        </div>
    </div>
    <script>
        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(e === 'test' && p === 'test') {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } else {
                document.getElementById('msg').innerText = "Try email: test / pass: test";
            }
        }
    </script>
</body>
</html>
