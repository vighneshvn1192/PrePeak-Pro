<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enterprise Secure Web App</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <style>
    :root { --primary: #2563eb; --bg: #f8fafc; }
    body { background-color: var(--bg); font-family: 'Inter', system-ui, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    
    /* Layout Containers */
    .app-container { width: 100%; max-width: 1000px; padding: 20px; }
    .auth-card { background: white; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); overflow: hidden; transition: all 0.5s ease; }
    
    /* UI States */
    .hidden { display: none !important; }
    .step-header { background: var(--primary); color: white; padding: 30px; text-align: center; }
    .step-body { padding: 40px; }
    
    /* Elements */
    .custom-input { border-radius: 10px; padding: 12px; border: 2px solid #e2e8f0; transition: 0.3s; margin-bottom: 20px; }
    .custom-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); outline: none; }
    .btn-action { background: var(--primary); border: none; padding: 14px; border-radius: 10px; font-weight: 600; color: white; width: 100%; transition: 0.3s; }
    .btn-action:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
    
    /* Dashboard Mockup */
    .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1/3fr); gap: 20px; margin-top: 20px; }
    .stat-card { background: #fff; padding: 20px; border-radius: 15px; border-left: 5px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    
    /* Animations */
    .spinner { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; display: inline-block; margin-right: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="auth-card animate__animated animate__fadeIn">
      
      <div id="step-register">
        <div class="step-header">
          <h2>Secure Access Portal</h2>
          <p class="mb-0 text-white-50">Please register to receive your secure access code</p>
        </div>
        <div class="step-body">
          <div class="row">
            <div class="col-md-6 d-none d-md-block text-center border-end">
              <img src="https://cdn-icons-png.flaticon.com/512/2092/2092663.png" style="width: 200px; margin-top: 20px;" alt="Secure">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Full Name</label>
              <input type="text" id="reg-name" class="form-control custom-input" placeholder="e.g. John Wick">
              
              <label class="form-label fw-bold">Email Address</label>
              <input type="email" id="reg-email" class="form-control custom-input" placeholder="name@company.com">
              
              <label class="form-label fw-bold">WhatsApp Number</label>
              <input type="tel" id="reg-phone" class="form-control custom-input" placeholder="+91 00000 00000">
              
              <button onclick="handleRegistration()" id="btn-reg" class="btn-action">
                Generate Access Code
              </button>
            </div>
          </div>
        </div>
      </div>

      <div id="step-verify" class="hidden animate__animated animate__fadeIn">
        <div class="step-header" style="background: #1e293b;">
          <h2>Two-Factor Authentication</h2>
          <p class="mb-0 text-white-50">Enter the 6-digit code sent to your email</p>
        </div>
        <div class="step-body text-center">
          <div style="max-width: 300px; margin: 0 auto;">
            <input type="text" id="verify-code" class="form-control custom-input text-center fs-2 fw-bold" maxlength="6" placeholder="000000">
            <button onclick="handleVerification()" id="btn-verify" class="btn-action">Verify & Secure Login</button>
            <p class="mt-4 text-muted small">Didn't get a code? <a href="#" onclick="location.reload()">Try again</a></p>
          </div>
        </div>
      </div>

      <div id="step-app" class="hidden animate__animated animate__zoomIn">
        <nav class="navbar navbar-dark bg-dark px-4 py-3">
          <span class="navbar-brand mb-0 h1">Enterprise Console</span>
          <span class="text-light" id="user-pill"></span>
        </nav>
        <div class="step-body" style="background: #f1f5f9; height: 500px; overflow-y: auto;">
          <h4 class="mb-4">System Overview</h4>
          <div class="row mb-4">
            <div class="col-md-4">
              <div class="stat-card">
                <h6>Total Users</h6>
                <h2 id="stat-users">...</h2>
              </div>
            </div>
            <div class="col-md-4">
              <div class="stat-card" style="border-left-color: #10b981;">
                <h6>Active Nodes</h6>
                <h2 id="stat-active">...</h2>
              </div>
            </div>
            <div class="col-md-4">
              <div class="stat-card" style="border-left-color: #f59e0b;">
                <h6>Security Status</h6>
                <h2 id="stat-status">Secure</h2>
              </div>
            </div>
          </div>
          
          <div class="card p-3 border-0 shadow-sm">
            <h5>Recent System Logs</h5>
            <ul id="activity-log" class="list-group list-group-flush">
              </ul>
          </div>
        </div>
      </div>

    </div>
    <div id="toast" class="mt-3 text-center fw-bold animate__animated"></div>
  </div>

  <script>
    // --- State Controllers ---
    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.className = `mt-3 text-center fw-bold animate__animated animate__shakeX ${isError ? 'text-danger' : 'text-success'}`;
      setTimeout(() => toast.innerText = "", 5000);
    }

    function toggleLoader(btnId, show) {
      const btn = document.getElementById(btnId);
      if(show) {
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner"></span> Processing...`;
      } else {
        btn.disabled = false;
        btn.innerHTML = btnId === 'btn-reg' ? 'Generate Access Code' : 'Verify & Secure Login';
      }
    }

    // --- Action Handlers ---
    function handleRegistration() {
      const data = {
        name: document.getElementById('reg-name').value,
        email: document.getElementById('reg-email').value,
        whatsapp: document.getElementById('reg-phone').value
      };

      if(!data.name || !data.email || !data.whatsapp) {
        return showToast("Please fill all fields properly!", true);
      }

      toggleLoader('btn-reg', true);
      google.script.run
        .withSuccessHandler(res => {
          if(res.success) {
            document.getElementById('step-register').classList.add('hidden');
            document.getElementById('step-verify').classList.remove('hidden');
            showToast("Code Sent! Check your Inbox.");
          } else {
            showToast(res.message, true);
            toggleLoader('btn-reg', false);
          }
        })
        .withFailureHandler(err => {
          showToast(err, true);
          toggleLoader('btn-reg', false);
        })
        .processAccessRequest(data);
    }

    function handleVerification() {
      const email = document.getElementById('reg-email').value;
      const code = document.getElementById('verify-code').value;

      if(code.length < 6) return showToast("Enter full 6-digit code", true);

      toggleLoader('btn-verify', true);
      google.script.run
        .withSuccessHandler(res => {
          if(res.authenticated) {
            loadDashboard(res.user);
          }
        })
        .withFailureHandler(err => {
          showToast(err.message, true);
          toggleLoader('btn-verify', false);
        })
        .validateAccessCode(email, code);
    }

    function loadDashboard(user) {
      document.getElementById('step-verify').classList.add('hidden');
      document.getElementById('step-app').classList.remove('hidden');
      document.getElementById('user-pill').innerText = `👤 ${user.name}`;
      
      // Fetch data for the dashboard mockup
      google.script.run.withSuccessHandler(data => {
        document.getElementById('stat-users').innerText = data.stats.users;
        document.getElementById('stat-active').innerText = data.stats.active;
        
        const log = document.getElementById('activity-log');
        data.recentActivity.forEach(msg => {
          const li = document.createElement('li');
          li.className = "list-group-item small text-muted";
          li.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
          log.appendChild(li);
        });
      }).getAppDashboardData();
    }
  </script>
</body>
</html>
